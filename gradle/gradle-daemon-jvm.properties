#
# Gradle Daemon JVM criteria. Added in Gradle 8.8 (incubating) and stabilized
# by 8.10. When this file is present, Gradle will launch its daemon on a JDK
# matching `toolchainVersion`, auto-provisioning one via the foojay resolver
# (configured in settings.gradle.kts) if none is installed locally.
#
# Why we pin to 17: the current Android Gradle Plugin (8.2.2) and the Kotlin
# compiler embedded in Gradle (1.9.20) both crash when evaluated on JDK 25
# with `IllegalArgumentException: 25.0.2`. JDK 17 is the sanctioned baseline
# for AGP 8.2 and stays out of the unsupported-version territory.
#
toolchainVersion=17
